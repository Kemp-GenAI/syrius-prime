<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SYRIUS PRIME</title>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #071225, #02040a 70%);
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    /* BACKGROUND GLOW FIELD */
    .glow {
      position: absolute;
      width: 600px;
      height: 600px;
      background: radial-gradient(circle,
        rgba(0,180,255,0.35),
        rgba(0,80,255,0.15),
        transparent 70%);
      filter: blur(50px);
      animation: pulse 6s ease-in-out infinite;
      z-index: 0;
    }

    /* MAIN CONTAINER */
    .container {
      position: relative;
      text-align: center;
      z-index: 2;
    }

    /* TITLE */
    h1 {
      font-size: 4rem;
      letter-spacing: 6px;
      margin: 0;

      background: linear-gradient(90deg, #7dd3ff, #2b7cff, #a5f3fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;

      text-shadow: 0 0 25px rgba(0,150,255,0.35);
    }

    /* SUBTITLE */
    p {
      margin-top: 12px;
      font-size: 0.95rem;
      opacity: 0.75;
      letter-spacing: 2px;
    }

    /* STATUS LINE */
    .status {
      margin-top: 6px;
      font-size: 0.75rem;
      opacity: 0.5;
    }

    /* PULSE ANIMATION */
    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.55; }
      50% { transform: scale(1.15); opacity: 0.9; }
      100% { transform: scale(1); opacity: 0.55; }
    }

    /* subtle vignette */
    body::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.7));
      z-index: 1;
    }
  </style>
</head>

<body>

  <div class="glow"></div>

  <div class="container">
    <h1>SYRIUS PRIME</h1>
    <p>Data Capture & Intelligence Layer</p>
    <div class="status">Landing system online • stable</div>
  </div>

</body>
</html>
