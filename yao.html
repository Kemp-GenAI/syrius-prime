<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YAO Capture</title>
</head>

<body style="font-family: Arial; padding: 40px;">

  <!-- Netlify hidden form detector (safe + standard) -->
  <form name="yao-profile" netlify hidden>
    <input type="text" name="name">
    <input type="text" name="identity">
    <input type="text" name="goal">
    <textarea name="notes"></textarea>
  </form>

  <h1>YAO Profile Capture</h1>

  <!-- Main visible form -->
  <form name="yao-profile" method="POST" netlify>

    <input type="hidden" name="form-name" value="yao-profile" />

    <p>
      <label>Name<br>
        <input type="text" name="name" required />
      </label>
    </p>

    <p>
      <label>Core Identity<br>
        <input type="text" name="identity" />
      </label>
    </p>

    <p>
      <label>Primary Goal<br>
        <input type="text" name="goal" />
      </label>
    </p>

    <p>
      <label>Notes<br>
        <textarea name="notes"></textarea>
      </label>
    </p>

    <p>
      <button type="submit">Submit Profile</button>
    </p>

  </form>

</body>
</html>
