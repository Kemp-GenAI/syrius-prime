<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YAO Profile</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background: #0f0f0f;
      color: #f5f5f5;
    }

    .container {
      max-width: 800px;
      margin: auto;
    }

    h1 {
      border-bottom: 1px solid #333;
      padding-bottom: 10px;
    }

    .card {
      background: #1a1a1a;
      padding: 20px;
      margin-top: 20px;
      border-radius: 10px;
    }

    .label {
      color: #888;
      font-size: 12px;
      text-transform: uppercase;
    }

    .value {
      font-size: 18px;
      margin-bottom: 10px;
    }

    .empty {
      color: #555;
      font-style: italic;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>YAO Profile Output Layer</h1>

    <div class="card">
      <div class="label">Status</div>
      <div class="value">Live Scaffold Active</div>
    </div>

    <div class="card">
      <div class="label">Profile Name</div>
      <div class="value empty">No data yet</div>

      <div class="label">Core Attributes</div>
      <div class="value empty">Waiting for capture input</div>

      <div class="label">Structured Intelligence</div>
      <div class="value empty">Pending transformation from yao.html</div>
    </div>

    <div class="card">
      <div class="label">System Note</div>
      <div class="value">
        This layer is ready to receive structured profile data from the capture system.
      </div>
    </div>

  </div>
</body>
</html>
